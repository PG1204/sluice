# Local dev stack for Sluice.
#
# `docker compose up` builds and runs the API server with Redis. The API serves
# queries over the bundled sample data in ./testdata. The dashboard service
# lands in Phase 9.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    command: ["--addr", ":8080", "--data", "/data"]
    volumes:
      - ./testdata:/data:ro
    depends_on:
      redis:
        condition: service_healthy

